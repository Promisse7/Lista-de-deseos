<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg"></div>
  <div class="gold-glow glow-one"></div>
  <div class="gold-glow glow-two"></div>

  <section class="screen active" id="home">
    <div class="glass-card hero-card">
      <div class="tiny-heart">♥</div>
      <h1 class="gold-title">Gift Card</h1>
      <p class="handwritten">Hecha con amor para vos.</p>
      <button class="gold-button" onclick="showScreen('access')">Comenzar</button>
    </div>
  </section>

  <section class="screen" id="access">
    <div class="glass-card">
      <div class="lock">🔒</div>
      <h2 class="section-title">Código de seguridad</h2>
      <p class="soft-text">Ingresá el código para abrir tu regalo</p>

      <input
        id="password"
        class="code-input"
        type="password"
        maxlength="4"
        placeholder="••••"
      />

      <button class="gold-button" onclick="unlockGift()">Acceder</button>
      <p id="error" class="error"></p>
    </div>
  </section>

  <section class="screen" id="unlock">
    <div class="glass-card">
      <div class="unlock">🔓</div>
      <h2 class="section-title">Desbloqueando...</h2>
      <p class="soft-text">Preparando tu regalo</p>
    </div>
  </section>

  <section class="screen" id="welcome">
    <div class="glass-card">
      <div class="big-heart">♥</div>
      <h2 class="birthday-title">Feliz cumpleaños mi amor</h2>
      <p class="welcome-text">
        Espero que te guste el regalo.<br>
        Te amo.
      </p>
    </div>
  </section>

  <section class="screen vault-screen" id="vault">
    <main class="vault-container">

      <header class="vault-header">
        <div class="tiny-heart">♥</div>
        <h1 class="gold-title small">Lista de regalos</h1>
        <p class="soft-text">30 regalos para Mariano</p>
      </header>

      <div class="progress-card">
        <div class="progress-top">
          <span id="progressText">♥ 0 / 30 regalos cumplidos</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <section class="gift-section">
        <button class="gift-section-header" onclick="toggleSection(this)">
          <span>⭐ 12 deseos especiales</span>
          <span class="arrow">⌄</span>
        </button>
        <div class="gift-list" id="deseos"></div>
      </section>

      <section class="gift-section">
        <button class="gift-section-header" onclick="toggleSection(this)">
          <span>❤️ 8 favores del corazón</span>
          <span class="arrow">⌄</span>
        </button>
        <div class="gift-list" id="corazon"></div>
      </section>

      <section class="gift-section">
        <button class="gift-section-header" onclick="toggleSection(this)">
          <span>⭐ 9 favores especiales</span>
          <span class="arrow">⌄</span>
        </button>
        <div class="gift-list" id="especiales"></div>
      </section>

      <section class="gift-section">
        <button class="gift-section-header" onclick="toggleSection(this)">
          <span>🎁 1 super regalo a elección</span>
          <span class="arrow">⌄</span>
        </button>
        <div class="gift-list" id="super"></div>
      </section>

    </main>
  </section>

  <script src="script.js"></script>
</body>
</html>
